<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Limfjordsspil – Saml Spøgelsesgarn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #e0e0e0;
      user-select: none;
      padding: 8px;
    }
    h1 { font-size: clamp(14px, 3vw, 20px); margin-bottom: 6px; color: #4fc3f7; letter-spacing: 1px; text-align: center; }
    #hud {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; margin-bottom: 6px;
      background: rgba(255,255,255,0.08);
      padding: 5px 14px; border-radius: 20px;
      font-size: clamp(11px, 2.5vw, 15px);
    }
    #hud b { color: #4fc3f7; }
    #canvas-wrap {
      width: 100%;
      max-width: 1600px;
      position: relative;
      touch-action: none;
    }
    canvas {
      border: 2px solid #2a6090;
      border-radius: 4px;
      display: block;
      width: 100%;
      height: auto;
    }
    #hint { margin-top: 5px; font-size: 11px; color: #667; text-align: center; }
    #legend {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; margin-top: 6px; font-size: clamp(10px, 2vw, 12px);
    }
    .leg { display: flex; align-items: center; gap: 5px; }
    .leg-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

    /* ── Joystick ── */
    #joystick-wrap {
      display: none;
      position: absolute;
      bottom: 14px;
      left: 14px;
      width: 110px;
      height: 110px;
      touch-action: none;
    }
    #joystick-base {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.25);
      position: absolute;
    }
    #joystick-knob {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(79,195,247,0.65);
      border: 2px solid #4fc3f7;
      position: absolute;
      top: 33px; left: 33px;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      #joystick-wrap { display: block; }
      #hint { display: none; }
    }
  </style>
</head>
<body>
  <h1>Limfjordsspil – Saml Spøgelsesgarn!</h1>
  <div id="hud">
    <span>Score: <b id="score">0</b></span>
    <span>Garn: <b id="garnCount">0</b></span>
    <span>Ruser: <b id="ruserCount">0</b></span>
    <span>Liner: <b id="linerCount">0</b></span>
    <span>Tid: <b id="timer">30</b> s</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="c" width="1600" height="1000"></canvas>
    <div id="joystick-wrap">
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>
    </div>
  </div>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#ff6b6b"></div>Garn = 10 pt</div>
    <div class="leg"><div class="leg-dot" style="background:#ffd93d"></div>Ruse = 25 pt</div>
    <div class="leg"><div class="leg-dot" style="background:#6bcb77"></div>Line = 5 pt</div>
    <span id="hint" style="color:#555; margin-left:10px">Piletaster / WASD · ENTER starter spillet</span>
  </div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Scale helper: map screen coords → canvas coords ──────────────────────────
function canvasScale() {
  const rect = canvas.getBoundingClientRect();
  return { sx: W / rect.width, sy: H / rect.height };
}

// ── Offscreen canvas for water detection ─────────────────────────────────────
const off = document.createElement('canvas');
off.width = W; off.height = H;
const offCtx = off.getContext('2d');
let imgData = null;

const fjordImg = new Image();
fjordImg.src = 'Data/Dybde tin Limfjord.jpg';

// ── Cities ────────────────────────────────────────────────────────────────────
const CITIES = [
  { name: 'Thisted',  x: 439,  y: 412, above: true },
  { name: 'Struer',   x: 384,  y: 926, above: true },
  { name: 'Løgstør',  x: 766,  y: 382, above: true },
  { name: 'Skive',    x: 660,  y: 828, above: true },
  { name: 'Aalborg',  x: 1173, y: 296, above: true },
];

// ── Gear types ────────────────────────────────────────────────────────────────
const GEAR = [
  { type: 'Garn', points: 10, color: '#ff6b6b' },
  { type: 'Ruse', points: 25, color: '#ffd93d' },
  { type: 'Line', points:  5, color: '#6bcb77' },
];

// ── Game state ─────────────────────────────────────────────────────────────────
let score = 0, garnN = 0, ruserN = 0, linerN = 0;
let gameTime = 30, running = false, lastTs = 0;
let items = [], floats = [], spawnT = 0;
let caughtByControl = false;

const player = { x: 1173, y: 298, angle: Math.PI, speed: 230, size: 21, delayed: 0, delayCity: '' };
const patrol  = { x: 800,  y: 370, angle: 0, speed: 110, size: 21, wanderT: 0 };

// ── Keyboard ──────────────────────────────────────────────────────────────────
const keys = {};
addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === 'Enter' && !running) startGame();
});
addEventListener('keyup', e => { keys[e.key] = false; });

// ── Joystick (touch) ──────────────────────────────────────────────────────────
const jWrap  = document.getElementById('joystick-wrap');
const jKnob  = document.getElementById('joystick-knob');
const jState = { active: false, id: null, ox: 0, oy: 0, dx: 0, dy: 0 };
const JR = 33; // max knob travel radius

function jPos(touch) {
  const rect = jWrap.getBoundingClientRect();
  return { x: touch.clientX - rect.left - 55, y: touch.clientY - rect.top - 55 };
}
jWrap.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  jState.active = true; jState.id = t.identifier;
  const p = jPos(t); jState.dx = 0; jState.dy = 0;
  if (!running) startGame();
}, { passive: false });
jWrap.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== jState.id) continue;
    const p = jPos(t);
    const len = Math.hypot(p.x, p.y);
    const clamped = len > JR ? JR / len : 1;
    jState.dx = p.x * clamped;
    jState.dy = p.y * clamped;
    jKnob.style.left = (33 + jState.dx) + 'px';
    jKnob.style.top  = (33 + jState.dy) + 'px';
  }
}, { passive: false });
function jEnd(e) {
  e.preventDefault();
  jState.active = false; jState.dx = 0; jState.dy = 0;
  jKnob.style.left = '33px'; jKnob.style.top = '33px';
}
jWrap.addEventListener('touchend',   jEnd, { passive: false });
jWrap.addEventListener('touchcancel',jEnd, { passive: false });

// Tap anywhere on canvas to start
canvas.addEventListener('touchstart', e => {
  if (!running) { e.preventDefault(); startGame(); }
}, { passive: false });

// ── Water detection ───────────────────────────────────────────────────────────
function isWater(x, y) {
  if (!imgData) return false;
  const ix = Math.max(0, Math.min(W-1, x|0));
  const iy = Math.max(0, Math.min(H-1, y|0));
  const i = (iy * W + ix) * 4;
  const r = imgData.data[i], g = imgData.data[i+1], b = imgData.data[i+2], a = imgData.data[i+3];
  return a > 40 && b > 110 && b > r + 15 && (r < 210 || g < 210 || b < 235);
}

// ── Spawn gear ────────────────────────────────────────────────────────────────
function spawnGear() {
  if (items.length >= 28) return;
  const g = GEAR[Math.floor(Math.random() * GEAR.length)];
  for (let t = 0; t < 120; t++) {
    const x = 25 + Math.random() * (W - 50);
    const y = 25 + Math.random() * (H - 50);
    if (isWater(x, y)) { items.push({ ...g, x, y, phase: Math.random() * Math.PI * 2 }); return; }
  }
}

// ── Patrol ────────────────────────────────────────────────────────────────────
function updatePatrol(dt) {
  patrol.wanderT -= dt;
  const lookDist = 75;
  const lx = patrol.x + Math.cos(patrol.angle) * lookDist;
  const ly = patrol.y + Math.sin(patrol.angle) * lookDist;
  if (!isWater(lx, ly) || patrol.wanderT <= 0) {
    let turned = false;
    for (let a = 1; a <= 14; a++) {
      const side = a % 2 === 0 ? 1 : -1;
      const testAngle = patrol.angle + side * Math.PI * 0.14 * Math.ceil(a / 2);
      const tx = patrol.x + Math.cos(testAngle) * lookDist;
      const ty = patrol.y + Math.sin(testAngle) * lookDist;
      if (isWater(tx, ty)) { patrol.angle = testAngle + (Math.random() - 0.5) * 0.3; turned = true; break; }
    }
    if (!turned) patrol.angle += Math.PI + (Math.random() - 0.5);
    patrol.wanderT = 2.5 + Math.random() * 4;
  }
  const nx = patrol.x + Math.cos(patrol.angle) * patrol.speed * dt;
  const ny = patrol.y + Math.sin(patrol.angle) * patrol.speed * dt;
  if (isWater(nx, ny)) { patrol.x = nx; patrol.y = ny; }
  else { patrol.angle += Math.PI * (0.4 + Math.random() * 0.6) * (Math.random() > 0.5 ? 1 : -1); patrol.wanderT = 0; }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (!running) return;
  gameTime -= dt;
  if (gameTime <= 0) { gameTime = 0; running = false; return; }

  for (const c of CITIES) c.cooldown = Math.max(0, (c.cooldown || 0) - dt);

  if (player.delayed > 0) {
    player.delayed = Math.max(0, player.delayed - dt);
  } else {
    // Input: keyboard + joystick
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
    if (jState.active) { dx += jState.dx / JR; dy += jState.dy / JR; }
    const len = Math.hypot(dx, dy);
    if (len > 0) {
      dx /= len; dy /= len;
      player.angle = Math.atan2(dy, dx);
      const nx = player.x + dx * player.speed * dt;
      const ny = player.y + dy * player.speed * dt;
      if      (isWater(nx, ny))        { player.x = nx; player.y = ny; }
      else if (isWater(nx, player.y))  { player.x = nx; }
      else if (isWater(player.x, ny))  { player.y = ny; }
    }

    for (const c of CITIES) {
      if (c.cooldown > 0) continue;
      if (Math.hypot(player.x - c.x, player.y - c.y) < 90) {
        player.delayed = 5; player.delayCity = c.name; c.cooldown = 22;
        floats.push({ x: player.x, y: player.y - 50, text: '📋 Sagsbehandling!', color: '#ffaa00', life: 1.8 });
        break;
      }
    }
  }

  spawnT -= dt;
  if (spawnT <= 0) { spawnGear(); spawnT = 1.8 + Math.random() * 2.5; }

  items.forEach(g => g.phase += dt * 3);
  if (player.delayed <= 0) {
    for (const g of items) {
      if (Math.hypot(g.x - player.x, g.y - player.y) < 46) {
        g.dead = true; score += g.points;
        if      (g.type === 'Garn') garnN++;
        else if (g.type === 'Ruse') ruserN++;
        else linerN++;
        floats.push({ x: g.x, y: g.y - 10, text: '+' + g.points, color: g.color, life: 1.1 });
      }
    }
  }
  items = items.filter(g => !g.dead);
  floats.forEach(f => { f.life -= dt; f.y -= 28 * dt; });
  floats = floats.filter(f => f.life > 0);

  updatePatrol(dt);
  if (Math.hypot(patrol.x - player.x, patrol.y - player.y) < player.size * 1.8) {
    caughtByControl = true; running = false; return;
  }

  document.getElementById('score').textContent = score;
  document.getElementById('garnCount').textContent = garnN;
  document.getElementById('ruserCount').textContent = ruserN;
  document.getElementById('linerCount').textContent = linerN;
  document.getElementById('timer').textContent = Math.ceil(gameTime);
}

// ── Draw gear ─────────────────────────────────────────────────────────────────
function drawGear(g) {
  const p = 0.85 + Math.sin(g.phase) * 0.15;
  ctx.save();
  ctx.translate(g.x, g.y);
  ctx.globalAlpha = p;
  ctx.shadowColor = g.color; ctx.shadowBlur = 14;
  ctx.strokeStyle = g.color; ctx.fillStyle = g.color;
  if (g.type === 'Garn') {
    ctx.lineWidth = 1.4;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath(); ctx.moveTo(-11, i*5); ctx.lineTo(11, i*5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(i*5, -11); ctx.lineTo(i*5, 11); ctx.stroke();
    }
    for (const [fx,fy] of [[-11,0],[11,0],[0,-11],[0,11]]) {
      ctx.beginPath(); ctx.arc(fx, fy, 2.5, 0, Math.PI*2); ctx.fill();
    }
  } else if (g.type === 'Ruse') {
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(-11,-9); ctx.lineTo(11,-9); ctx.lineTo(7,9); ctx.lineTo(-7,9); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6,-9); ctx.lineTo(0,-3); ctx.moveTo(6,-9); ctx.lineTo(0,-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-9,-1); ctx.lineTo(9,-1); ctx.moveTo(-7,5); ctx.lineTo(7,5); ctx.stroke();
  } else {
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-13,0);
    for (let i = 0; i <= 26; i++) ctx.lineTo(-13+i, Math.sin(i*0.55)*5);
    ctx.stroke();
    ctx.lineWidth = 1.5;
    for (const hx of [-8,0,8]) { ctx.beginPath(); ctx.arc(hx,4,3,0,Math.PI); ctx.stroke(); }
  }
  ctx.restore();
  ctx.globalAlpha = 0.85;
  ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
  ctx.strokeStyle = 'rgba(0,0,0,0.9)'; ctx.lineWidth = 2.5;
  ctx.strokeText(g.type+' '+g.points+'pt', g.x, g.y+19);
  ctx.fillStyle = '#fff'; ctx.fillText(g.type+' '+g.points+'pt', g.x, g.y+19);
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ── Draw boat ──────────────────────────────────────────────────────────────────
function drawBoat(x, y, angle, sz) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#a0d8ef';
  ctx.beginPath(); ctx.ellipse(-sz*2.2,0,sz*1.8,sz*0.45,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#c8820a';
  ctx.beginPath(); ctx.moveTo(sz*1.5,0); ctx.lineTo(sz*0.9,-sz*0.6); ctx.lineTo(-sz*1.2,-sz*0.52); ctx.lineTo(-sz*1.4,0); ctx.lineTo(-sz*1.2,sz*0.52); ctx.lineTo(sz*0.9,sz*0.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e09820';
  ctx.beginPath(); ctx.moveTo(sz*1.3,0); ctx.lineTo(sz*0.8,-sz*0.42); ctx.lineTo(-sz*1.0,-sz*0.37); ctx.lineTo(-sz*1.15,0); ctx.lineTo(-sz*1.0,sz*0.37); ctx.lineTo(sz*0.8,sz*0.42); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(-sz*0.2,-sz*0.38,sz*0.72,sz*0.76);
  ctx.fillStyle='#7ec8e3'; ctx.fillRect(-sz*0.14,-sz*0.30,sz*0.28,sz*0.28); ctx.fillRect(sz*0.22,-sz*0.30,sz*0.28,sz*0.28);
  ctx.fillStyle='#5a2d0c'; ctx.fillRect(-sz*0.07,-sz*1.25,sz*0.14,sz*0.9);
  ctx.strokeStyle='#5a2d0c'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(sz*0.05,-sz*0.5); ctx.lineTo(sz*1.25,-sz*0.22); ctx.stroke();
  ctx.fillStyle='#ff4'; ctx.beginPath(); ctx.arc(sz*1.4,0,2.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw patrol ────────────────────────────────────────────────────────────────
function drawPatrol(x, y, angle, sz) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
  ctx.globalAlpha=0.3; ctx.fillStyle='#80c8ff';
  ctx.beginPath(); ctx.ellipse(-sz*2.2,0,sz*1.8,sz*0.45,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#0e2a5c';
  ctx.beginPath(); ctx.moveTo(sz*1.5,0); ctx.lineTo(sz*0.9,-sz*0.6); ctx.lineTo(-sz*1.2,-sz*0.52); ctx.lineTo(-sz*1.4,0); ctx.lineTo(-sz*1.2,sz*0.52); ctx.lineTo(sz*0.9,sz*0.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(-sz*0.85,-sz*0.13,sz*1.65,sz*0.26);
  ctx.fillStyle='#4466aa';
  ctx.beginPath(); ctx.moveTo(sz*1.3,0); ctx.lineTo(sz*0.8,-sz*0.42); ctx.lineTo(-sz*1.0,-sz*0.37); ctx.lineTo(-sz*1.15,0); ctx.lineTo(-sz*1.0,sz*0.37); ctx.lineTo(sz*0.8,sz*0.42); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ccd'; ctx.fillRect(-sz*0.2,-sz*0.38,sz*0.72,sz*0.76);
  ctx.fillStyle='#5599cc'; ctx.fillRect(-sz*0.14,-sz*0.30,sz*0.28,sz*0.28); ctx.fillRect(sz*0.22,-sz*0.30,sz*0.28,sz*0.28);
  ctx.fillStyle='#222'; ctx.fillRect(-sz*0.07,-sz*1.25,sz*0.14,sz*0.9);
  const flash = (Date.now() % 500) < 250;
  ctx.shadowColor='#44f'; ctx.shadowBlur=22;
  ctx.fillStyle=flash?'#2244ff':'#99aaff';
  ctx.beginPath(); ctx.arc(0,-sz*1.35,sz*0.28,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
  ctx.save(); ctx.font=`bold ${Math.round(sz*0.9)}px Arial`; ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.95)'; ctx.lineWidth=4; ctx.strokeText('KONTROL',x,y-sz*2.1);
  ctx.fillStyle='#ff3333'; ctx.fillText('KONTROL',x,y-sz*2.1);
  ctx.restore();
}

// ── Draw cities ────────────────────────────────────────────────────────────────
function drawCity(c) {
  const pulse = 0.45 + 0.25 * Math.sin(Date.now()/500);
  const zoneActive = (c.cooldown || 0) <= 0;
  ctx.save();
  ctx.globalAlpha = zoneActive ? pulse : 0.12;
  ctx.strokeStyle='#ff9900'; ctx.lineWidth=3; ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.arc(c.x,c.y,90,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  ctx.fillStyle='#fff'; ctx.strokeStyle='#222'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(c.x,c.y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  const ty = c.above ? c.y-12 : c.y+20;
  ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,20,0.95)'; ctx.lineWidth=3;
  ctx.strokeText(c.name,c.x,ty); ctx.fillStyle='#fff'; ctx.fillText(c.name,c.x,ty);
  const sy = c.above ? c.y-26 : c.y+34;
  ctx.font='10px Arial'; ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=2;
  ctx.strokeText('📋 sagsbehandler',c.x,sy); ctx.fillStyle='#ffcc66'; ctx.fillText('📋 sagsbehandler',c.x,sy);
}

// ── Overlay ────────────────────────────────────────────────────────────────────
function drawOverlay() {
  ctx.fillStyle='rgba(5,15,35,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const cx=W/2, cy=H/2;
  if (caughtByControl) {
    ctx.fillStyle='#ff2222'; ctx.font='bold 58px Arial'; ctx.fillText('FANGET!',cx,cy-110);
    ctx.fillStyle='#fff'; ctx.font='26px Arial'; ctx.fillText('Fiskerikontrollen tog dig!',cx,cy-55);
    ctx.font='22px Arial'; ctx.fillText('Du nåede '+score+' point',cx,cy-10);
    ctx.font='17px Arial';
    ctx.fillStyle='#ff6b6b'; ctx.fillText('Garn: '+garnN,cx,cy+30);
    ctx.fillStyle='#ffd93d'; ctx.fillText('Ruser: '+ruserN,cx,cy+56);
    ctx.fillStyle='#6bcb77'; ctx.fillText('Liner: '+linerN,cx,cy+82);
    ctx.fillStyle='#aaa'; ctx.font='17px Arial'; ctx.fillText('Tryk ENTER / tryk på skærmen for at prøve igen',cx,cy+130);
  } else if (gameTime <= 0) {
    ctx.fillStyle='#4fc3f7'; ctx.font='bold 42px Arial'; ctx.fillText('Spillet er slut!',cx,cy-90);
    ctx.fillStyle='#fff'; ctx.font='26px Arial'; ctx.fillText('Du indsamlede '+score+' point',cx,cy-45);
    ctx.font='17px Arial';
    ctx.fillStyle='#ff6b6b'; ctx.fillText('Garn: '+garnN,cx,cy);
    ctx.fillStyle='#ffd93d'; ctx.fillText('Ruser: '+ruserN,cx,cy+26);
    ctx.fillStyle='#6bcb77'; ctx.fillText('Liner: '+linerN,cx,cy+52);
    ctx.fillStyle='#aaa'; ctx.font='17px Arial'; ctx.fillText('Tryk ENTER / tryk på skærmen for at prøve igen',cx,cy+105);
  } else {
    ctx.fillStyle='#4fc3f7'; ctx.font='bold 38px Arial'; ctx.fillText('Limfjordsspil',cx,cy-100);
    ctx.fillStyle='#ddd'; ctx.font='19px Arial'; ctx.fillText('Styr fartøjet og ryd Limfjorden for spøgelsesgarn!',cx,cy-60);
    const rows=[
      {color:'#ff6b6b',txt:'Garn = 10 point (forsømte fiskenet)'},
      {color:'#ffd93d',txt:'Ruse = 25 point (tabte fangstkurve)'},
      {color:'#6bcb77',txt:'Line = 5 point (forladte fiskeliner)'},
    ];
    rows.forEach((r,i)=>{ ctx.fillStyle=r.color; ctx.font='16px Arial'; ctx.fillText(r.txt,cx,cy-15+i*27); });
    ctx.fillStyle='#ffcc44'; ctx.font='16px Arial';
    ctx.fillText('📋 Sagsbehandlere i byerne fryser dig i 5 sek (orange ring = aktiv)',cx,cy+52);
    ctx.fillStyle='#ff7777'; ctx.font='bold 16px Arial';
    ctx.fillText('⚠ Undgå fiskerikontrollen (blåt blink) – den tager dig øjeblikkeligt!',cx,cy+80);
    ctx.fillStyle='#999'; ctx.font='15px Arial';
    ctx.fillText('Piletaster / WASD · Du har 30 sekunder',cx,cy+100);
    ctx.fillStyle='#4fc3f7'; ctx.font='bold 22px Arial';
    ctx.fillText('⏎ Tryk ENTER eller tryk på skærmen for at starte',cx,cy+130);
  }
}

// ── Main draw ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  if (imageLoaded) ctx.drawImage(fjordImg,0,0,W,H);
  for (const c of CITIES) drawCity(c);
  for (const g of items) drawGear(g);
  drawPatrol(patrol.x,patrol.y,patrol.angle,patrol.size);
  drawBoat(player.x,player.y,player.angle,player.size);

  if (player.delayed > 0) {
    const pulse = 0.5+0.5*Math.sin(Date.now()/120);
    const sz = player.size;
    ctx.save();
    ctx.globalAlpha=0.35+0.25*pulse; ctx.strokeStyle='#ff9900'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(player.x,player.y,sz*2.8+pulse*8,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    const secs=Math.ceil(player.delayed);
    ctx.font='bold 20px Arial'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.95)'; ctx.lineWidth=4;
    ctx.strokeText(`Sagsbehandling i ${player.delayCity}`,player.x,player.y-sz*3.2);
    ctx.fillStyle='#ffaa00'; ctx.fillText(`Sagsbehandling i ${player.delayCity}`,player.x,player.y-sz*3.2);
    ctx.font='bold 28px Arial';
    ctx.strokeText(`${secs}s`,player.x,player.y-sz*4.8);
    ctx.fillStyle='#fff'; ctx.fillText(`${secs}s`,player.x,player.y-sz*4.8);
    ctx.restore();
  }

  for (const f of floats) {
    ctx.globalAlpha=Math.min(1,f.life*2); ctx.font='bold 18px Arial'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.85)'; ctx.lineWidth=3;
    ctx.strokeText(f.text,f.x,f.y); ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
    ctx.globalAlpha=1;
  }
  if (!running) drawOverlay();
}

// ── Loop ───────────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt); draw();
  requestAnimationFrame(loop);
}

// ── Start ──────────────────────────────────────────────────────────────────────
function startGame() {
  score=0; garnN=0; ruserN=0; linerN=0;
  gameTime=30; items=[]; floats=[]; spawnT=0.4;
  caughtByControl=false;
  player.x=1173; player.y=298; player.angle=Math.PI; player.delayed=0; player.delayCity='';
  CITIES.forEach(c=>c.cooldown=8);
  patrol.angle=Math.random()*Math.PI*2; patrol.wanderT=1;
  let found=false;
  for (let t=0;t<300;t++) {
    const px=50+Math.random()*(W-100), py=50+Math.random()*(H-100);
    if (isWater(px,py)&&Math.hypot(px-1173,py-298)>500){patrol.x=px;patrol.y=py;found=true;break;}
  }
  if (!found){patrol.x=800;patrol.y=370;}
  running=true;
  for (let i=0;i<20;i++) spawnGear();
  ['score','garnCount','ruserCount','linerCount'].forEach(id=>document.getElementById(id).textContent=0);
  document.getElementById('timer').textContent=30;
}

// ── Bootstrap ──────────────────────────────────────────────────────────────────
let imageLoaded = false;
fjordImg.onload = () => {
  imageLoaded = true;
  offCtx.drawImage(fjordImg,0,0,W,H);
  try { imgData = offCtx.getImageData(0,0,W,H); } catch(e) { /* CORS */ }
  lastTs = performance.now();
  requestAnimationFrame(loop);
};
fjordImg.onerror = () => {
  lastTs = performance.now();
  requestAnimationFrame(loop);
};
</script>
